name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: make install-dev
      - name: Run validation
        run: make validate
      - name: Smoke-run benchmarks
        run: make bench-smoke
