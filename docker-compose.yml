services:
  chroma:
    image: "chromadb/chroma:${CHROMA_IMAGE_TAG:-1.5.6}"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 8000), 2).close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  rabbitmq:
    image: "rabbitmq:${RABBITMQ_IMAGE_TAG:-4.1.4-management}"
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:-video_se}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:-video_se_dev}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-1234}:1234"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "1234"
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: "${CHROMA_COLLECTION:-video_search_engine}"
      ML_DEVICE: "${ML_DEVICE:-cpu}"
      MODEL_CACHE_DIR: /models
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - model-cache:/models
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:1234/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ui-search:
    build:
      context: .
      dockerfile: docker/ui-search.Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      API_HOST: api
      API_PORT: "1234"
      SEARCH_API_TIMEOUT_SECONDS: "${SEARCH_API_TIMEOUT_SECONDS:-10}"
      VIDEO_DATA_PATH: /data/videos
      ML_DEVICE: "${ML_DEVICE:-cpu}"
    volumes:
      - ./data/videos:/data/videos:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 8501), 2).close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ui-speaker:
    build:
      context: .
      dockerfile: docker/ui-speaker.Dockerfile
    ports:
      - "${SPEAKER_UI_PORT:-5050}:5050"
    environment:
      OUTPUT_DIR: /data/processed
      VIDEO_DATA_PATH: /data/videos
    volumes:
      - ./data/videos:/data/videos:ro
      - ./data/processed:/data/processed
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 5050), 2).close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ingestion-worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    command: ["python", "-m", "ingestion_pipeline.worker"]
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: "${CHROMA_COLLECTION:-video_search_engine}"
      OUTPUT_DIR: /data/processed
      VIDEO_DATA_PATH: /data/videos
      MODEL_CACHE_DIR: /models
      SPEAKER_UI_MODE: external
      SPEAKER_MAP_TIMEOUT_SECONDS: "${SPEAKER_MAP_TIMEOUT_SECONDS:-3600}"
      ML_DEVICE: "${ML_DEVICE:-cpu}"
      HF_TOKEN: "${HF_TOKEN:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      RABBITMQ_URL: "amqp://${RABBITMQ_DEFAULT_USER:-video_se}:${RABBITMQ_DEFAULT_PASS:-video_se_dev}@rabbitmq:5672/%2F"
      INGESTION_QUEUE: "${INGESTION_QUEUE:-video.ingestion}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - ./data/videos:/data/videos
      - ./data/processed:/data/processed
      - model-cache:/models
    depends_on:
      rabbitmq:
        condition: service_healthy
      chroma:
        condition: service_healthy

volumes:
  chroma-data:
  rabbitmq-data:
  model-cache:
